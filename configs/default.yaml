# Конфигурация эксперимента
# Использование: python src/train.py --config configs/default.yaml
# CLI-аргументы имеют приоритет над YAML.

experiment:
  name: "alchemy_egnn_full"
  seed: 42
  device: "cuda"

data:
  data_dir: "data/alchemy"
  batch_size: 1024
  num_workers: 4
  # Лимиты молекул (null = весь датасет 202579 молекул)
  # Для отладки: 10000 / 500 / 500
  # Для финала: null / null / null
  max_train: null       # null = все молекулы
  max_val: null
  max_test: null

# TDA параметры
tda:
  n_bins: 16
  max_radius: 5.0

model:
  name: "egnn"           # fcnn | schnet | egnn | egnn_tda | egnn_vector | egnn_vector_tda
  hidden_channels: 128
  num_layers: 4
  num_rbf: 16
  cutoff: 5.0

training:
  epochs: 9999           # максимум (EarlyStopping остановит раньше)
  lr: 0.001              # canonical default для EGNN (см. v32 unification)
  weight_decay: 0.00001
  scheduler: "reduce_on_plateau"
  lr_patience: 5
  patience: 15

# Что предсказываем
targets:
  target: "all"          # mu | alpha | gap | all

# Робастность к шуму (для отдельного eval-скрипта, не для обучения)
robustness:
  noise_sigma: [0.0, 0.05, 0.10, 0.15]
