# CI for alchemy-geom-tda (v33+)
# Запускается на каждый push/PR в main.
# Устанавливает зависимости (CPU-версии), гоняет pytest и ruff check.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install system dependencies (rdkit, gudhi)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libboost-all-dev libeigen3-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # CPU torch ПЕРВЫМ (меньше, без CUDA wheels)
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          # Остальные зависимости (torch уже удовлетворён)
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check src/ tests/ data/

      - name: Run pytest
        run: pytest --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: .pytest_cache/
          retention-days: 7
